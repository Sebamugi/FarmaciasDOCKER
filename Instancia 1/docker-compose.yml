version: '3.8'

services:
  mariadb:
    image: mariadb:10.5
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: farmacias_db
      MYSQL_USER: api_user
      MYSQL_PASSWORD: tu_password_seguro
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./setup_database.sql:/docker-entrypoint-initdb.d/setup.sql
    command: --bind-address=0.0.0.0

  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mariadb
    environment:
      DB_HOST: mariadb
      DB_USER: api_user
      DB_PASSWORD: tu_password_seguro
      DB_DATABASE: farmacias_db
    volumes:
      - .:/app

volumes:
  mariadb_data:
